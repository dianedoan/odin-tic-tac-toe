<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Tic Tac Toe</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="game-container">
            <div class="game-cell" id="0"></div>
            <div class="game-cell" id="1"></div>
            <div class="game-cell" id="2"></div>
            <div class="game-cell" id="3"></div>
            <div class="game-cell" id="4"></div>
            <div class="game-cell" id="5"></div>
            <div class="game-cell" id="6"></div>
            <div class="game-cell" id="7"></div>
            <div class="game-cell" id="8"></div>
        </div>
        <div class="results-container">
            <h2 class="current-player"></h2>
            <div class="scores-container">
                <h3 class="playerX-score"></h3>
                <h3 class="playerO-score"></h3>
            </div>
        </div>
        <form id="player-form">
            <label for="playerX">Player X Name</label>
            <input type="text" id="playerX" required>
            <label for="playerX">Player O Name</label>
            <input type="text" id="playerO" required>
            <button id="start-btn" type="submit">Start Game</button>
        </form>
    </div>
</body>
</html>
